name: CI
on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v**'
  pull_request:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout sources
      uses: actions/checkout@v6

    - name: Setup Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install jsonnet, jsonnet-bundler and grafana/plugin-validator
      run: |
        go install github.com/google/go-jsonnet/cmd/jsonnet@latest
        go install github.com/jsonnet-bundler/jsonnet-bundler/cmd/jb@latest
        go install github.com/grafana/plugin-validator/pkg/cmd/plugincheck2@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: make deps

    - name: Test plugin
      run: make test-frontend-coverage test-backend-coverage

    - name: Build plugin
      run: make build

    - name: Create plugin zip file
      run: make zip

    - name: Run plugincheck
      # ignore unsigned plugin error in CI
      run: make plugincheck || true

    - name: Publish build artifact
      uses: actions/upload-artifact@v6
      with:
        name: build
        path: build

  uitests:
    name: 'UI Tests (${{ matrix.grafana_image }})'
    needs: build
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        grafana_image: ['grafana:12.4.1', 'grafana:latest']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps

      - name: Download the build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build

      - name: Start PCP and Valkey in a pod
        run: |
          # workaround required on GitHub Actions to allow running systemd in rootless containers
          # https://github.com/actions/virtual-environments/issues/3536
          # https://github.com/ansible-community/molecule/discussions/3155
          loginctl enable-linger $(whoami)

          make test-ui-start-pod

      - name: Start Grafana
        run: make GRAFANA_IMAGE=docker.io/grafana/${{ matrix.grafana_image }} test-ui-start-grafana-build

      - name: Wait for Grafana to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3001/api/health && break
            sleep 2
          done

      - name: Run UI Tests
        run: BASE_URL="http://127.0.0.1:3001" yarn e2e

      - name: Set artifact name
        if: failure()
        run: echo "ARTIFACT_NAME=playwright-$(echo '${{ matrix.grafana_image }}' | tr ':' '-')" >> $GITHUB_ENV

      - name: Publish Playwright test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: playwright-report
